<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Markdown WebViewer</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" aria-label="目次を開く">☰</button>
    <div class="title-wrap">
      <div id="bookTitle" class="book-title">Markdown WebViewer</div>
      <div id="chapterTitle" class="chapter-title">読み込み中...</div>
    </div>
    <button id="settingsBtn" class="icon-btn" aria-label="設定を開く">⚙</button>
  </header>

  <aside id="sidebar" class="sidebar" aria-label="目次">
    <div class="sidebar-head">
      <strong>目次</strong>
      <button id="closeMenuBtn" class="icon-btn" aria-label="目次を閉じる">×</button>
    </div>
    <nav id="toc" class="toc"></nav>
  </aside>

  <div id="backdrop" class="backdrop"></div>

  <main id="reader" class="reader">
    <article id="content" class="markdown-body">
      <p>Markdownファイルを読み込んでいます。</p>
    </article>
  </main>

  <section id="settingsPanel" class="settings-panel" aria-label="設定">
    <div class="settings-head">
      <strong>表示設定</strong>
      <button id="closeSettingsBtn" class="icon-btn" aria-label="設定を閉じる">×</button>
    </div>

    <label class="setting-row">
      <span>文字サイズ</span>
      <input id="fontSize" type="range" min="14" max="30" step="1" />
      <output id="fontSizeValue"></output>
    </label>

    <label class="setting-row">
      <span>行間</span>
      <input id="lineHeight" type="range" min="1.4" max="2.2" step="0.1" />
      <output id="lineHeightValue"></output>
    </label>

    <label class="setting-row">
      <span>本文幅</span>
      <input id="contentWidth" type="range" min="640" max="1100" step="20" />
      <output id="contentWidthValue"></output>
    </label>

    <label class="switch-row">
      <span>ダークモード</span>
      <input id="darkMode" type="checkbox" />
    </label>

    <label class="switch-row">
      <span>タップでページ移動</span>
      <input id="tapScroll" type="checkbox" />
    </label>

    <div class="button-row">
      <button id="prevBtn" class="sub-btn">前の章</button>
      <button id="nextBtn" class="sub-btn">次の章</button>
    </div>
  </section>

  <div class="tap-help" id="tapHelp">下側タップ: 下へ / 上側タップ: 上へ</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
